<!-- Inherit from base template -->
{% extends "base.html" %}

<!-- Override the title block -->
{% block title %}Study Cards - Cards App{% endblock %}

<!-- Main content block -->
{% block content %}
<div class="row">
    <div class="col-md-10 mx-auto">
        <h1>Study Cards</h1>

        <!-- Deck Selection Section -->
        <div class="card" id="deckSelectionSection">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Select a Deck</h5>
            </div>
            <div class="card-body">
                <div id="deckList">
                    <!-- Decks will be loaded here -->
                    <p class="text-muted">Loading decks...</p>
                </div>
            </div>
        </div>

        <!-- Card Study Section -->
        <div class="card" id="studySection" style="display: none;">
            <div class="card-header bg-success text-white">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-0">Studying: <span id="studyDeckName"></span></h5>
                        <small>Card <span id="currentCardNumber">0</span> of <span id="totalCards">0</span></small>
                    </div>
                    <button type="button" class="btn btn-sm btn-light" onclick="exitStudyMode()">
                        Back to Decks
                    </button>
                </div>
            </div>
            <div class="card-body">
                <!-- Progress Bar -->
                <div class="progress mb-4" style="height: 25px;">
                    <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                        <span id="progressText">0%</span>
                    </div>
                </div>

                <!-- Flashcard Display -->
                <div class="mb-4">
                    <div class="row mb-3">
                        <!-- Question -->
                        <div class="col-md-6">
                            <div class="card bg-light">
                                <div class="card-body p-5" style="min-height: 250px; display: flex; flex-direction: column; justify-content: center; text-align: center;">
                                    <p class="text-muted mb-2">QUESTION</p>
                                    <h3 id="cardQuestion" class="mb-0">Loading...</h3>
                                </div>
                            </div>
                        </div>

                        <!-- Answer -->
                        <div class="col-md-6">
                            <div class="card bg-light" id="answerCard" style="display: none;">
                                <div class="card-body p-5" style="min-height: 250px; display: flex; flex-direction: column; justify-content: center; text-align: center;">
                                    <p class="mb-2">ANSWERS</p>
                                    <div id="cardAnswers"></div>
                                </div>
                            </div>

                            <!-- Placeholder when answer is hidden -->
                            <div class="card bg-light" id="answerPlaceholder" style="display: block;">
                                <div class="card-body p-5 text-center" style="min-height: 250px; display: flex; align-items: center; justify-content: center;">
                                    <p class="text-muted mb-0">Reveal Answer to See</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Reveal/Hide Answer Buttons -->
                    <div class="row">
                        <div class="col-12">
                            <button type="button" class="btn btn-lg btn-warning w-100" id="showAnswerBtn"
                                    onclick="revealAnswer()">
                                Reveal Answer
                            </button>

                            <button type="button" class="btn btn-lg btn-secondary w-100" id="hideAnswerBtn"
                                    onclick="hideAnswer()" style="display: none;">
                                Hide Answer
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Navigation Buttons -->
                <div class="d-flex justify-content-between gap-2">
                    <button type="button" class="btn btn-lg btn-outline-primary flex-grow-1" id="prevBtn"
                            onclick="previousCard()" disabled>
                        Previous Card
                    </button>

                    <div class="d-flex align-items-center">
                        <span id="cardCounter" class="text-muted px-3">Card 0/0</span>
                    </div>

                    <button type="button" class="btn btn-lg btn-outline-primary flex-grow-1" id="nextBtn"
                            onclick="nextCard()">
                        Next Card
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load decks when page loads
    window.onload = function() {
        loadDecksForStudy();
    };

    const userId = {{ userId }};
    let currentDeckId = null;
    let currentDeckName = '';
    let currentCards = [];
    let currentCardIndex = 0;

    // Load and display all decks for selection
    function loadDecksForStudy() {
        fetch('{{ url_for("getDecks") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ userId: userId })
        })
        .then(response => response.json())
        .then(data => {
            const deckListDiv = document.getElementById('deckList');
            deckListDiv.innerHTML = '';

            if (data.success && data.decks.length > 0) {
                data.decks.forEach(deck => {
                    const deckCard = document.createElement('div');
                    deckCard.className = 'card mb-3';
                    deckCard.style.cursor = 'pointer';

                    const cardBody = document.createElement('div');
                    cardBody.className = 'card-body';
                    cardBody.onclick = () => startStudying(deck.deckID, deck.description);

                    const row = document.createElement('div');
                    row.className = 'row align-items-center';

                    const colLeft = document.createElement('div');
                    colLeft.className = 'col-md-8';

                    const title = document.createElement('h5');
                    title.className = 'card-title mb-2';
                    title.textContent = deck.description;

                    const subtitle = document.createElement('p');
                    subtitle.className = 'card-text text-muted mb-0';
                    subtitle.innerHTML = `<small>${deck.cardCount} cards</small>`;

                    colLeft.appendChild(title);
                    colLeft.appendChild(subtitle);

                    const colRight = document.createElement('div');
                    colRight.className = 'col-md-4 text-end';

                    const btnStart = document.createElement('button');
                    btnStart.className = 'btn btn-primary';
                    btnStart.textContent = 'Start';
                    btnStart.onclick = (e) => {
                        e.stopPropagation();
                        startStudying(deck.deckID, deck.description);
                    };

                    colRight.appendChild(btnStart);

                    row.appendChild(colLeft);
                    row.appendChild(colRight);
                    cardBody.appendChild(row);
                    deckCard.appendChild(cardBody);
                    deckListDiv.appendChild(deckCard);
                });
            } else {
                deckListDiv.innerHTML = '<p class="text-muted">No decks available.</p>';
            }
        })
        .catch(error => console.error('Error:', error));
    }

    // Load cards from a deck and start studying
    function startStudying(deckId, deckName) {
        // Load all cards from the selected deck
        fetch('{{ url_for("listCards") }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ deckId: deckId })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success && data.cards.length > 0) {
                // Store the deck information and cards
                currentDeckId = deckId;
                currentDeckName = deckName;
                currentCards = data.cards;
                currentCardIndex = 0;

                // Update UI
                document.getElementById('studyDeckName').textContent = deckName;
                document.getElementById('totalCards').textContent = currentCards.length;
                document.getElementById('deckSelectionSection').style.display = 'none';
                document.getElementById('studySection').style.display = 'block';

                // Display the first card
                displayCurrentCard();
            } else {
                alert('No cards found in this deck.');
            }
        })
        .catch(error => console.error('Error:', error));
    }

    // Display current card with question
    function displayCurrentCard() {
        // Update card counter
        document.getElementById('currentCardNumber').textContent = currentCardIndex + 1;
        document.getElementById('cardCounter').textContent = `Card ${currentCardIndex + 1} of ${currentCards.length}`;

        // Update progress bar
        const progress = ((currentCardIndex + 1) / currentCards.length) * 100;
        document.getElementById('progressBar').style.width = progress + '%';
        document.getElementById('progressBar').setAttribute('aria-valuenow', progress);
        document.getElementById('progressText').textContent = Math.round(progress) + '%';

        // Display the question
        const currentCard = currentCards[currentCardIndex];
        document.getElementById('cardQuestion').textContent = currentCard.question;

        // Reset answer display
        hideAnswer();

        // Only disable previous button when at start
        document.getElementById('prevBtn').disabled = currentCardIndex === 0;

        // Change next button text and style on last card
        const nextBtn = document.getElementById('nextBtn');
        const isLastCard = currentCardIndex === currentCards.length - 1;
        if (isLastCard) {
            nextBtn.textContent = 'Restart Deck';
            nextBtn.className = 'btn btn-lg btn-danger flex-grow-1';
        } else {
            nextBtn.textContent = 'Next Card';
            nextBtn.className = 'btn btn-lg btn-outline-primary flex-grow-1';
        }
    }

    // Show the answer
    function revealAnswer() {
        const currentCard = currentCards[currentCardIndex];
        const answersDiv = document.getElementById('cardAnswers');
        answersDiv.innerHTML = '';

        currentCard.answers.forEach((answer) => {
            const answerElement = document.createElement('div');
            answerElement.className = 'mb-2';

            const heading = document.createElement('h5');
            heading.textContent = answer;

            answerElement.appendChild(heading);
            answersDiv.appendChild(answerElement);
        });

        // Hide placeholder and show answer card
        document.getElementById('answerPlaceholder').style.display = 'none';
        document.getElementById('answerCard').style.display = 'block';
        document.getElementById('showAnswerBtn').style.display = 'none';
        document.getElementById('hideAnswerBtn').style.display = 'block';
    }

    // Hide the answer
    function hideAnswer() {
        document.getElementById('answerCard').style.display = 'none';
        document.getElementById('answerPlaceholder').style.display = 'block';
        document.getElementById('showAnswerBtn').style.display = 'block';
        document.getElementById('hideAnswerBtn').style.display = 'none';
    }

    // Go to previous card
    function previousCard() {
        if (currentCardIndex > 0) {
            currentCardIndex--;
            displayCurrentCard();
        }
    }

    // Go to next card (loops back to start at end)
    function nextCard() {
        if (currentCardIndex < currentCards.length - 1) {
            currentCardIndex++;
        } else {
            currentCardIndex = 0;
        }
        displayCurrentCard();
    }

    // Exit study mode and return to deck selection
    function exitStudyMode() {
        // Reset variables
        currentDeckId = null;
        currentDeckName = '';
        currentCards = [];
        currentCardIndex = 0;

        // Update UI
        document.getElementById('studySection').style.display = 'none';
        document.getElementById('deckSelectionSection').style.display = 'block';

        // Reload decks
        loadDecksForStudy();
    }

    // Escape HTML to prevent XSS attacks
    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Handle keyboard shortcuts
    document.addEventListener('keydown', function(event) {
        if (document.getElementById('studySection').style.display === 'none') {
            return;
        }

        switch(event.key) {
            case ' ':
            case 'ArrowRight':
                event.preventDefault();
                nextCard();
                break;
            case 'ArrowLeft':
                event.preventDefault();
                if (!document.getElementById('prevBtn').disabled) {
                    previousCard();
                }
                break;
            case 'a':
            case 'A':
                event.preventDefault();
                if (document.getElementById('answerCard').style.display === 'none') {
                    revealAnswer();
                } else {
                    hideAnswer();
                }
                break;
        }
    });
</script>
{% endblock %}
